<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://sleepie.uk/oneko.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raunak Singh // rys</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Vanilla Tilt.js , lifesaver -->
    <script src="https://cdn.jsdelivr.net/npm/vanilla-tilt@1.8.1/dist/vanilla-tilt.min.js"></script>

    <style>
        :root {
            --bg-color: #0c0c0c;
            --terminal-bg: #0d1117;
            --accent-peach: #ffb4a2;
            --accent-green: #4ade80;
            --text-dim: #949494;
            --grid-color: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            cursor: default;
        }

        .terminal-window {
            background-color: var(--terminal-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 750px;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        .terminal-header {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }

        .terminal-body { padding: 40px; }

        .command { color: var(--accent-green); margin-bottom: 8px; font-weight: bold; }
        .name-heading { color: white; font-size: 2.5rem; margin-bottom: 4px; }
        
        .typing::after {
            content: "_";
            animation: blink 1s step-start infinite;
            color: var(--accent-peach);
        }
        @keyframes blink { 50% { opacity: 0; } }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-dim);
            transition: all 0.2s ease;
            margin-bottom: 12px;
            text-decoration: none;
        }

        .nav-link:hover {
            color: var(--accent-peach);
            transform: translateX(8px);
        }

        .skill-tag {
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.2);
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        #oneko { 
            pointer-events: none; 
            z-index: 9999; 
            image-rendering: pixelated; 
            width: 32px;
            height: 32px;
            position: fixed;
            background-image: url('./oneko.gif');
        }
    </style>
</head>
<body>

    <div class="terminal-window" id="tilt-card">
        <div class="terminal-header">
            <div class="dot dot-red"></div>
            <div class="dot dot-yellow"></div>
            <div class="dot dot-green"></div>
        </div>

        <div class="terminal-body">
            <div class="mb-10">
                <div class="command">$ whoami</div>
                <h1 id="typewriter" class="name-heading font-medium typing"></h1>
                <p class="text-sm opacity-60">developer? // undergrad @</p>
            </div>

            <div class="mb-10">
                <div class="command">$ skills</div>
                <div class="flex flex-wrap gap-3 mt-4">
                    <span class="skill-tag">placeholder</span>
                    <span class="skill-tag">placeholder</span>
                    <span class="skill-tag">placeholder</span>
                    <span class="skill-tag">placeholder</span>
                    <span class="skill-tag">placeholder</span>
                    <span class="skill-tag">placeholder</span>
                </div>
            </div>

            <nav>
                <div class="command">$ ls content/</div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 mt-4">
                    <a href="#" class="nav-link"><i data-lucide="book-open" size="18"></i> placeholder</a>
                    <a href="#" class="nav-link"><i data-lucide="camera" size="18"></i> placeholder</a>
                    <a href="#" class="nav-link"><i data-lucide="layout" size="18"></i> placeholder</a>
                    <a href="#" class="nav-link"><i data-lucide="clapperboard" size="18"></i> placeholder</a>
                    <a href="#" class="nav-link"><i data-lucide="github" size="18"></i> placeholder</a>
                    <a href="#" class="nav-link"><i data-lucide="heart" size="18"></i> placeholder</a>
                </div>
            </nav>
        </div>
    </div>

    <script>
        // Oneko Cat huge thanks to https://sleepie.uk/oneko.js 
        (function oneko() {
            const nekoEl = document.createElement("div");
            let nekoPosX = 32, nekoPosY = 32;
            let mousePosX = 0, mousePosY = 0;
            let frameCount = 0, idleTime = 0;
            let idleAnimation = null, idleAnimationFrame = 0;
            const nekoSpeed = 10;

            const spriteSets = {
                idle: [[-3, -3]], alert: [[-7, -3]], scratch: [[-5, 0], [-6, 0], [-7, 0]],
                tired: [[-3, -2]], sleeping: [[-2, 0], [-2, -1]],
                N: [[-1, -2], [-1, -3]], NE: [[0, -2], [0, -3]], E: [[-3, 0], [-3, -1]],
                SE: [[-5, -1], [-5, -2]], S: [[-6, -3], [-7, -2]], SW: [[-5, -3], [-6, -1]],
                W: [[-4, -2], [-4, -3]], NW: [[-1, 0], [-1, -1]]
            };

            function create() {
                nekoEl.id = "oneko";
                nekoEl.style.width = "32px";
                nekoEl.style.height = "32px";
                nekoEl.style.position = "fixed";
                nekoEl.style.backgroundImage = "url('./oneko.gif')";
                nekoEl.style.imageRendering = "pixelated";
                nekoEl.style.left = "16px";
                nekoEl.style.top = "16px";
                document.body.appendChild(nekoEl);

                document.onmousemove = (event) => {
                    mousePosX = event.clientX;
                    mousePosY = event.clientY;
                };

                window.onekoInterval = setInterval(frame, 100);
            }

            function setSprite(name, frame) {
                const sprite = spriteSets[name][frame % spriteSets[name].length];
                nekoEl.style.backgroundPosition = `${sprite[0] * 32}px ${sprite[1] * 32}px`;
            }

            function resetIdleAnimation() {
                idleAnimation = null;
                idleAnimationFrame = 0;
            }

            function idle() {
                idleTime += 1;
                if (idleTime > 10 && Math.floor(Math.random() * 200) == 0 && idleAnimation == null) {
                    idleAnimation = ["sleeping", "scratch"][Math.floor(Math.random() * 2)];
                }

                switch (idleAnimation) {
                    case "sleeping":
                        if (idleAnimationFrame < 8) { setSprite("tired", 0); break; }
                        setSprite("sleeping", Math.floor(idleAnimationFrame / 4));
                        if (idleAnimationFrame > 192) resetIdleAnimation(); break;
                    case "scratch":
                        setSprite("scratch", idleAnimationFrame);
                        if (idleAnimationFrame > 9) resetIdleAnimation(); break;
                    default: setSprite("idle", 0); return;
                }
                idleAnimationFrame += 1;
            }

            function frame() {
                frameCount += 1;
                const diffX = nekoPosX - mousePosX, diffY = nekoPosY - mousePosY;
                const distance = Math.sqrt(diffX ** 2 + diffY ** 2);

                if (distance < nekoSpeed || distance < 48) { idle(); return; }

                idleAnimation = null;
                idleAnimationFrame = 0;

                if (idleTime > 1) {
                    setSprite("alert", 0);
                    idleTime = Math.min(idleTime, 7);
                    idleTime -= 1;
                    return;
                }

                let direction = diffY / distance > 0.5 ? "N" : "";
                direction += diffY / distance < -0.5 ? "S" : "";
                direction += diffX / distance > 0.5 ? "W" : "";
                direction += diffX / distance < -0.5 ? "E" : "";
                setSprite(direction, frameCount);

                nekoPosX -= (diffX / distance) * nekoSpeed;
                nekoPosY -= (diffY / distance) * nekoSpeed;
                nekoEl.style.left = `${nekoPosX - 16}px`;
                nekoEl.style.top = `${nekoPosY - 16}px`;
            }

            create();
        })();

        // Typewriter Effect (what I wanted)
        const text = "Raunak Singh";
        const target = document.getElementById('typewriter');
        let charIdx = 0;

        function type() {
            if (charIdx < text.length) {
                target.textContent += text.charAt(charIdx);
                charIdx++;
                setTimeout(type, 120);
            }
        }

        // Main Initialization
        function init() {
            type();
            lucide.createIcons();

            // Tilt lesgoooo
            VanillaTilt.init(document.getElementById("tilt-card"), {
                max: 10,           // tilt
                speed: 700,        // smoother 
                perspective: 1500,
                glare: true,
                "max-glare": 0.15,   // ← definitely not overkill
                scale: 1.02,       // okay i guess this is fine
                reset: true,
                reverse: false
            });
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
